<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <title>Reindirizzamento...</title>
  </head>
  <body>
    <script>
      (function () {
        var base = "/nataledelsignore";
        var path = window.location.pathname.replace(base, "");
        sessionStorage.setItem("redirect", path + window.location.search + window.location.hash);
        window.location.replace(base + "/");
      })();
    </script>
  </body>
</html>
